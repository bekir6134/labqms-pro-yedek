[phases.setup]
nixPkgs = [
  "nodejs_20",
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "libdrm",
  "dbus",
  "libxkbcommon",
  "xorg.libX11",
  "xorg.libXcomposite",
  "xorg.libXdamage",
  "xorg.libXext",
  "xorg.libXfixes",
  "xorg.libXrandr",
  "xorg.libxcb",
  "mesa",
  "expat",
  "glib",
  "freetype",
  "fontconfig",
  "harfbuzz",
  "ttf-dejavu",
  "ca-certificates"
]

[phases.install]
cmds = ["npm install"]

[start]
cmd = "node server.js"
