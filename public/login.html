<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Giriş Yap - LabQMS Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary:#1E40AF; --border:#e2e8f0; --bg:#f1f5f9; --danger:#ef4444; --success:#10B981; }
        body { font-family:'Inter',sans-serif; background:var(--bg); margin:0; display:flex; justify-content:center; align-items:center; height:100vh; color:#334155; }
        .login-card { background:#fff; padding:40px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.05); width:100%; max-width:400px; text-align:center; }
        .logo-box { width:60px; height:60px; background:#e0e7ff; color:var(--primary); font-size:2rem; display:flex; align-items:center; justify-content:center; border-radius:16px; margin:0 auto 15px auto; }
        h1 { margin:0 0 5px 0; color:var(--primary); font-size:1.8rem; }
        p { margin:0 0 30px 0; color:#64748b; font-size:0.9rem; }
        .form-group { margin-bottom:20px; text-align:left; }
        label { display:block; font-size:0.85rem; font-weight:600; color:#64748b; margin-bottom:8px; }
        input[type="text"], input[type="password"] { width:100%; padding:12px 15px; border:1px solid var(--border); border-radius:8px; box-sizing:border-box; outline:none; transition:0.2s; font-family:inherit; font-size:0.95rem; }
        input:focus { border-color:var(--primary); box-shadow:0 0 0 3px rgba(30,64,175,0.1); }
        .btn { background:var(--primary); color:white; padding:14px 20px; border:none; border-radius:8px; font-weight:bold; font-size:1rem; cursor:pointer; width:100%; transition:0.2s; margin-top:10px; }
        .btn:hover { background:#1e3a8a; transform:translateY(-1px); }
        .btn:disabled { opacity:0.6; cursor:not-allowed; transform:none; }
        #error-msg { color:var(--danger); font-size:0.85rem; font-weight:600; margin-top:15px; display:none; background:#fee2e2; padding:10px; border-radius:6px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-box">🔬</div>
        <h1>LabQMS Pro</h1>
        <p>Laboratuvar Yönetim Sistemine Giriş Yapın</p>

        <form id="loginForm">
            <div class="form-group">
                <label>Kullanıcı Adı</label>
                <input type="text" id="kullanici_adi" placeholder="Kullanıcı adınızı girin" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Şifre</label>
                <input type="password" id="sifre" placeholder="Şifrenizi girin" required>
            </div>
            <button type="submit" class="btn" id="loginBtn">Sisteme Giriş Yap</button>
            <div id="error-msg"></div>
        </form>
    </div>

    <script>
        // Zaten giriş yapmışsa direkt ana sayfaya gönder
        if (localStorage.getItem("labqms_user")) {
            window.location.href = "index.html";
        }

        document.getElementById("loginForm").onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById("loginBtn");
            const errorMsg = document.getElementById("error-msg");
            const kullanici_adi = document.getElementById("kullanici_adi").value.trim();
            const sifre = document.getElementById("sifre").value.trim();

            btn.textContent = "Giriş Yapılıyor...";
            btn.disabled = true;
            errorMsg.style.display = "none";

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ kullanici_adi, sifre })
                });
                const data = await res.json();

                if (res.ok && data.success) {
                    localStorage.setItem("labqms_user", JSON.stringify(data.user));
                    window.location.href = "index.html";
                } else {
                    errorMsg.textContent = "❌ " + (data.error || "Giriş başarısız!");
                    errorMsg.style.display = "block";
                }
            } catch (err) {
                errorMsg.textContent = "❌ Sunucuya bağlanılamadı!";
                errorMsg.style.display = "block";
            } finally {
                btn.textContent = "Sisteme Giriş Yap";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
